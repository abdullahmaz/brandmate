<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="kameez-fill" x1="4" y1="4" x2="28" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A53234"/>
      <stop offset="100%" stop-color="#5A1A1B"/>
    </linearGradient>
    <linearGradient id="bg-fill" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FBF5EA"/>
      <stop offset="100%" stop-color="#EFE3CE"/>
    </linearGradient>
  </defs>

  <!-- Rounded paper background so the mark sits well in any browser tab -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="url(#bg-fill)"/>

  <!-- Kameez silhouette, scaled to fill more of the canvas. The little
       neck V is the only detail we keep — placket beads disappear at 16px. -->
  <path d="
        M 13.4 4.2
        L 10.8 4.6
        L 4.4 9.5
        L 4.1 12.0
        L 8.3 13.0
        L 9.6 12.0
        L 4.8 27.6
        Q 16 30.4 27.2 27.6
        L 22.4 12.0
        L 23.7 13.0
        L 27.9 12.0
        L 27.6 9.5
        L 21.2 4.6
        L 18.6 4.2
        L 18.0 5.6
        L 16 10.0
        L 14.0 5.6
        Z"
        fill="url(#kameez-fill)"/>

  <!-- Gold V-neck inset, made thicker so it survives at 16×16 -->
  <path d="M 14 5.4 L 16 10.0 L 18 5.4"
        fill="none"
        stroke="#D4A24C"
        stroke-width="1.6"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Single gold bead at the placket — visible even at 16px -->
  <circle cx="16" cy="13" r="1.3" fill="#D4A24C"/>
</svg>
